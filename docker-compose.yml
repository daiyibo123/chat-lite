services:
  backend:
    build:
      context: ./backend
    container_name: chat-lite-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/app/uploads:/app/app/uploads
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    container_name: chat-lite-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
